name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Validate and package Linux amd64
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      tag: ${{ steps.metadata.outputs.tag }}
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate release identity
        id: metadata
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [[ ! "${tag}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::release tag must be a stable semantic version such as v0.2.0"
            exit 1
          fi

          version="${tag#v}"
          notes="docs/releases/${tag}.md"
          if [[ ! -s "${notes}" ]]; then
            echo "::error::release notes are missing or empty: ${notes}"
            exit 1
          fi
          if ! grep -Fq "${tag}" "${notes}"; then
            echo "::error::release notes do not identify ${tag}: ${notes}"
            exit 1
          fi

          commit="$(git rev-parse HEAD)"
          tagged_commit="$(git rev-parse "${tag}^{commit}")"
          if [[ "${tagged_commit}" != "${commit}" ]]; then
            echo "::error::${tag} resolves to ${tagged_commit}, but checkout is ${commit}"
            exit 1
          fi
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "${commit}" refs/remotes/origin/main; then
            echo "::error::${tag} commit ${commit} is not contained in origin/main"
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "commit=${commit}" >> "${GITHUB_OUTPUT}"
          echo "notes=${notes}" >> "${GITHUB_OUTPUT}"

      - name: Format
        shell: bash
        run: |
          set -euo pipefail
          unformatted="$(gofmt -l $(git ls-files '*.go'))"
          if [[ -n "${unformatted}" ]]; then
            echo "::error::gofmt found unformatted Go files"
            echo "${unformatted}"
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Race test
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

      - name: Build Linux amd64
        env:
          VERSION: ${{ steps.metadata.outputs.version }}
          COMMIT: ${{ steps.metadata.outputs.commit }}
        run: |
          set -euo pipefail
          mkdir -p dist
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build \
            -buildvcs=false \
            -trimpath \
            -ldflags "-X github.com/swornagent/sworn/internal/buildinfo.version=${VERSION} -X github.com/swornagent/sworn/internal/buildinfo.commit=${COMMIT}" \
            -o dist/sworn \
            ./cmd/sworn

      - name: Smoke-test version JSON
        env:
          VERSION: ${{ steps.metadata.outputs.version }}
          COMMIT: ${{ steps.metadata.outputs.commit }}
        run: |
          set -euo pipefail
          dist/sworn version --json | jq -e \
            --arg version "${VERSION}" \
            --arg commit "${COMMIT}" \
            '.version == $version and .commit == $commit' >/dev/null

      - name: Package release assets
        env:
          TAG: ${{ steps.metadata.outputs.tag }}
          NOTES: ${{ steps.metadata.outputs.notes }}
        run: |
          set -euo pipefail
          package="sworn-${TAG}-linux-amd64"
          archive="${package}.tar.gz"
          mkdir -p "dist/${package}"
          install -m 0755 dist/sworn "dist/${package}/sworn"
          install -m 0644 README.md LICENSE "dist/${package}/"
          tar \
            --sort=name \
            --mtime='@0' \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            --format=ustar \
            -C dist \
            -cf - \
            "${package}" | gzip -n > "dist/${archive}"
          (
            cd dist
            sha256sum "${archive}" > checksums.txt
          )
          cp "${NOTES}" dist/release-notes.md

      - name: Preserve release assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sworn-release
          path: |
            dist/sworn-*-linux-amd64.tar.gz
            dist/checksums.txt
            dist/release-notes.md
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Retrieve release assets
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: sworn-release
          path: release-assets

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          set -euo pipefail
          mapfile -t archives < <(find release-assets -maxdepth 1 -type f -name 'sworn-*-linux-amd64.tar.gz' -print)
          if [[ "${#archives[@]}" -ne 1 ]]; then
            echo "::error::expected exactly one Linux amd64 archive, found ${#archives[@]}"
            exit 1
          fi
          (
            cd release-assets
            sha256sum --check checksums.txt
          )

          release_is_draft=""
          if release_is_draft="$(gh release view "${TAG}" --json isDraft --jq '.isDraft' 2>/dev/null)"; then
            if [[ "${release_is_draft}" != "true" ]]; then
              echo "::error::${TAG} is already published; release assets and notes are immutable"
              exit 1
            fi
          else
            gh release create "${TAG}" \
              --draft \
              --verify-tag \
              --title "Sworn ${TAG}" \
              --notes-file release-assets/release-notes.md
          fi
          gh release upload "${TAG}" \
            "${archives[0]}" \
            release-assets/checksums.txt \
            --clobber
          gh release edit "${TAG}" \
            --draft=false \
            --title "Sworn ${TAG}" \
            --notes-file release-assets/release-notes.md
