name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Smoke test — sworn version
        run: |
          set -e
          ARCHIVE=$(ls dist/sworn_*.tar.gz | head -1)
          tar xzf "$ARCHIVE"
          ./sworn version

      - name: Smoke test — sworn verify (stub)
        run: |
          set -e
          echo "# S09 smoke spec" > /tmp/smoke-spec.md
          echo "" >> /tmp/smoke-spec.md
          echo "- [ ] trivial" >> /tmp/smoke-spec.md
          echo "PASS" > /tmp/smoke-diff
          ./sworn verify --spec /tmp/smoke-spec.md --diff /tmp/smoke-diff || echo "verify returned non-zero (expected without model config)"