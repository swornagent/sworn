name: live

# Live-model tests. DELIBERATELY NOT PART OF THE PR GATE.
#
# A live model call is non-deterministic: output varies, providers rate-limit, outages
# happen. Put that in the gate that blocks merges and it will flake; a flaky gate gets
# muted, and a muted guard is a decoration (Baton Rule 12 — a guard fails loudly, or it
# fails SILENTLY by returning green over a domain it never searched). ci.yml stays fast,
# deterministic and mocked. This runs on a cadence and on demand.
#
# What it proves that mocks cannot: THAT A REAL MODEL CAN SATISFY THE CONTRACT WE
# PUBLISHED. Baton v0.12.0 split `severity` from `blocking` and made the verdict derived;
# parseLLMResponse validates against llm-check-report-v1 and fails closed on violation.
# If models do not reliably emit `blocking`, every check is red for every user, always.
# A fail-closed gate whose failure mode is "everything fails" must be proved able to PASS.

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Model to test against (provider/model)'
        required: false
        default: 'openai/gpt-4.1-mini'
  schedule:
    # Nightly, 14:00 UTC (~midnight AEST) — off the critical path.
    - cron: '0 14 * * *'

permissions:
  contents: read

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: live model tests
        env:
          SWORN_LIVE_TESTS: '1'
          SWORN_LIVE_MODEL: ${{ inputs.model || 'openai/gpt-4.1-mini' }}
          # Canonical name. No SWORN_ prefix — the credential layer reads the env var
          # the wider ecosystem already uses, then credentials.json (XDG).
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ] && [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::No provider key in secrets — the live tests would all SKIP,"
            echo "::error::and a suite that skips everything reports green while proving nothing."
            exit 1
          fi
          go test ./... -run 'Live' -v -count=1
