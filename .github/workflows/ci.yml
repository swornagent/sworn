name: CI

on:
  push:
    branches: [v1]
  pull_request:
    branches: [v1]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Format
        run: test -z "$(gofmt -l $(git ls-files '*.go'))"
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
