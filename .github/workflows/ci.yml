name: ci

on:
  push:
    branches: ["main", "release/**", "release-wt/**"]
  pull_request:
    branches: ["main", "release/**"]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: public-safe scan
        run: bash scripts/public-safe-scan.sh

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt: the following files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: build
        run: go build ./...

      - name: vet
        run: go vet ./...

      - name: test
        run: go test ./...
