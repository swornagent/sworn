name: ci

on:
  push:
    branches: ["main", "release/**", "release-wt/**"]
  pull_request:
    branches: ["main", "release/**"]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: vet
        run: go vet ./...

      - name: test
        run: go test ./...

      - name: lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64
