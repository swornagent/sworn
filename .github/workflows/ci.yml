name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main, "release/**"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -buildvcs=false
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Format
        run: >-
          test -z "$(git ls-files -z -- '*.go'
          ':(exclude,top).baton/releases/**'
          | xargs -0 -r gofmt -l)"
      - name: Test
        run: go test ./...
      - name: Race test
        run: go test -race ./...
      - name: Vet
        run: go vet ./...
      - name: Build without CGO
        run: CGO_ENABLED=0 go build -buildvcs=false -trimpath ./cmd/sworn
