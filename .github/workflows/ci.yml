name: CI

on:
  push:
    branches: [release/v1.0.0]
  pull_request:
    branches: [release/v1.0.0]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Format
        run: test -z "$(gofmt -l $(git ls-files '*.go'))"
      - name: Test
        run: go test ./...
      - name: Race test
        run: go test -race ./...
      - name: Vet
        run: go vet ./...
      - name: Build without CGO
        run: CGO_ENABLED=0 go build ./cmd/sworn
