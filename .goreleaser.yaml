# Goreleaser configuration for SwornAgent (sworn CLI).
# Triggered by .github/workflows/release.yml on v* tag push.
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: sworn
    main: ./cmd/sworn
    binary: sworn
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    flags:
      - -trimpath

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    # Windows users expect .zip, not .tar.gz — and Scoop consumes the zip.
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore"
      - Merge pull request
      - Merge branch

brews:
  - name: sworn
    repository:
      owner: swornagent
      name: homebrew-tap
    homepage: https://github.com/swornagent/sworn
    description: "Provider-neutral adversarial verification for coding agents"
    license: MIT
    test: |
      system "#{bin}/sworn version"

# Windows (Scoop). Reuses the SAME PAT as the Homebrew tap — grant that one
# token write access to BOTH swornagent/homebrew-tap and swornagent/scoop-bucket
# so there is a single secret to manage. Consumes the windows .zip archive.
scoops:
  - name: sworn
    repository:
      owner: swornagent
      name: scoop-bucket
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/swornagent/sworn
    description: "Provider-neutral adversarial verification for coding agents"
    license: MIT

# Linux distro packages (.deb / .rpm / .apk). No external repo or token needed —
# GoReleaser's nfpm is pure Go and simply attaches these to the GitHub release.
nfpms:
  - id: sworn
    package_name: sworn
    vendor: SwornAgent
    homepage: https://github.com/swornagent/sworn
    maintainer: SwornAgent <maintainer@sworn.sh>
    description: "Provider-neutral adversarial verification for coding agents"
    license: MIT
    formats: [deb, rpm, apk]
    bindir: /usr/bin
    section: devel

dockers:
  - image_templates:
      - "ghcr.io/swornagent/sworn:{{ .Version }}-amd64"
    goos: linux
    goarch: amd64
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
    dockerfile: Dockerfile
  - image_templates:
      - "ghcr.io/swornagent/sworn:{{ .Version }}-arm64"
    goos: linux
    goarch: arm64
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
    dockerfile: Dockerfile

docker_manifests:
  - name_template: "ghcr.io/swornagent/sworn:{{ .Version }}"
    image_templates:
      - "ghcr.io/swornagent/sworn:{{ .Version }}-amd64"
      - "ghcr.io/swornagent/sworn:{{ .Version }}-arm64"
  - name_template: "ghcr.io/swornagent/sworn:latest"
    image_templates:
      - "ghcr.io/swornagent/sworn:{{ .Version }}-amd64"
      - "ghcr.io/swornagent/sworn:{{ .Version }}-arm64"

release:
  github:
    owner: swornagent
    name: sworn